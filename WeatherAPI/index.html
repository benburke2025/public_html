<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Display</title>
    <link rel="stylesheet" href="mystyle.css">

</head>

<body>

    <div class="container">

        <h1>Weather Forecast</h1>

        <input type="text" id="location" placeholder="Enter city name" value="New York">

        <button onclick="getWeather()">Get Weather</button>

        <div id="weather" class="weather-info">

            <h2 id="cityName"></h2>

            <div class="weather-detail">Temperature: <span id="temp"></span>°F</div>
            <div class="weather-detail">Conditions: <span id="conditions"></span></div>
            <div class="weather-detail">Humidity: <span id="humidity"></span>%</div>
            <div class="weather-detail">Wind Speed: <span id="windspeed"></span> mph</div>

        </div>

    </div>

    <script>

        async function getWeather() {

            const location = document.getElementById('location').value;
            const apiKey = 'BR9JZN6TVPJJJBN9X73UAD3DY';

            try {

                const response = await fetch(

                    `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${location}/?unitGroup=us&key=${apiKey}`

                );

                const data = await response.json();

                const current = data.currentConditions;

                document.getElementById('cityName').textContent = data.resolvedAddress;
                document.getElementById('temp').textContent = current.temp;
                document.getElementById('conditions').textContent = current.conditions;
                document.getElementById('humidity').textContent = current.humidity;
                document.getElementById('windspeed').textContent = current.windspeed;
                document.getElementById('weather').classList.add('show');

            } catch (error) {

                alert('Error fetching weather data: ' + error.message);

            }

        }

    </script>

</body>

</html>
